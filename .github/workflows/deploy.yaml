name: Deploy

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      # [共用 env]
      AWS_REGION: ap-southeast-1 # AWS Region

      # [NextJS env]
      NEXTJS_STATIC_OUTPUT_PATH: .next/static # Next.js static output path
      NEXTJS_PUBLIC_PATH: public # Next.js public output path
      S3_BUCKET: lazy-cv # 用來存 Next.js 靜態資產的 S3 bucket
      LAMBDA_NAME: lazy-cv # Lambda function name
      ECR_REPOSITORY: lazy-cv
      IMAGE_TAG: ${{ github.sha }}
      NEXT_PUBLIC_API_BASE_URL: https://lazy-cv.com/api
      CLOUDFRONT_DISTRIBUTION_ID: E11DN130QMD9L0
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      # [START] 共同建置與部署流程
      - name: 1. 拉 repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 固定 Node 版本
        uses: actions/setup-node@v4
        with:
          node-version: 20
        env:
          PNPM_STORE_PATH: ~/.pnpm-store
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 3. 安裝依賴
        run: pnpm install --frozen-lockfile

      - name: 4. Build 所有 package
        run: pnpm -r build

      - name: 5. 設定 AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }} # [START] 部署 Storybook

      - name: 7-1-a. Login to Amazon ECR Private
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      # 2. 登入公有 ECR (為了解決 COPY --from=public.ecr.aws 的 Rate Limit)
      - name: 7-1-b. Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        env:
          AWS_REGION: us-east-1 # 公有 ECR 目前只在 us-east-1 有服務
        with:
          registry-type: public

      - name: 7-2. Build and push Docker image for Lambda
        run: |
          # 強制停用 BuildKit 的進階 Manifest 功能
          docker build \
            --platform linux/amd64 \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .

          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      # - name: 7-3. 更新資料庫 Schema
      #   run: |
      #     pnpm db:push
      #   env:
      #     DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: 7-4. 更新 Lambda function 使用新的 Image
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_NAME }} \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

          aws lambda wait function-updated --function-name ${{ env.LAMBDA_NAME }}

      - name: 7-5. 更新 S3 上的 Next.js 靜態資產
        run: |
          aws s3 sync ${{ env.NEXTJS_STATIC_OUTPUT_PATH }} s3://${{ env.S3_BUCKET }}/_next/static \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

          aws s3 sync ${{ env.NEXTJS_PUBLIC_PATH }} s3://${{ env.S3_BUCKET }}/public \
            --delete \
            --cache-control "public, max-age=3600" # public 檔案通常不帶 Hash，建議快取時間設短一點

      - name: 7-6. 清除 Next.js static CloudFront cache
        if: success()
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/_next/static/*"
